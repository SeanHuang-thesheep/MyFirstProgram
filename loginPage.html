<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEGAS Login</title>
    <link rel="stylesheet" href="loginPageStyle.css">
</head>
<body>
  <div class="brand">MEGAS</div>

    <div class="arc"></div>
    <div class="arc arc2"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="container">
        <div class="login-card">
        <div class="icon-box">↪</div>

        <h1>Sign in with email</h1>
        <p class="subtitle">
            Welcome back to MEGAS.<br />
            Please enter your login details below.
        </p>

        <form>
            <div class="input-group">
            <span class="left-icon">✉</span>
            <input type="email" placeholder="Email" id="email" />
            </div>

            <div class="input-group">
            <span class="left-icon">🔒</span>
            <input type="password" placeholder="Password" id="password" />
            <span class="right-icon" onclick="togglePassword()">👁</span>
            </div>

            <div class="extra">
            <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn" onclick="login()">Login</button>
        </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            if (input.type === "password"){
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
        async function login(){
            const email = document.getElementById("email")
            const password = document.getElementById("password")
        }
    </script>
</body>
</html>
